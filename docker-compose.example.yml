services:
  ductor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ductor
    restart: unless-stopped
    environment:
      DUCTOR_HOME: /home/node/.ductor
      CODEX_HOME: /home/node/.codex
      # Set your server timezone, e.g. UTC or Europe/Moscow
      TZ: UTC
    volumes:
      # Main ductor state (config, sessions, cron, webhooks, logs, memory)
      - ./.ductor:/home/node/.ductor

      # Provider auth directories (persist your CLI login)
      - ${HOME}/.codex:/home/node/.codex
      - ${HOME}/.claude:/home/node/.claude

      # Project workspace available to the agent
      - ./projects:/home/node/.ductor/workspace/projects

      # Optional: if you want ductor's internal docker sandbox mode inside this container
      # - /var/run/docker.sock:/var/run/docker.sock

    # Uncomment if you use inbound webhooks and expose webhooks.port from config.json
    # ports:
    #   - "8742:8742"
